<mat-toolbar color="primary">
  <div class="logo-icons-group" [class.is-open]="isLogoIconsOpen">
    <app-logo (click)="toggleLogoIcons($event)"></app-logo>
    <div class="logo-hover-icons">
      <a
        mat-icon-button
        class="company-site-button"
        [href]="configService.logoUrl"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="World Wide Web"
        title="World Wide Web">
        <mat-icon>public</mat-icon>
      </a>
      <app-social-icon type="telegram" [url]="configService.telegramUrl"></app-social-icon>
      <app-social-icon type="whatsapp" [url]="configService.whatsAppUrl"></app-social-icon>
      <app-social-icon type="viber" [url]="configService.viberUrl"></app-social-icon>
      <app-social-icon type="facebook" [url]="configService.facebookUrl"></app-social-icon>
    </div>
  </div>
  
  <span class="spacer"></span>

  <div class="auth-actions">
    <button matButton="tonal" type="button" class="auth-button register-button">
      {{ 'auth.register' | translate }}
    </button>
    <button matButton="tonal" type="button" class="auth-button login-button">
      {{ 'auth.login' | translate }}
    </button>
  </div>

  <button
    mat-icon-button
    class="settings-button"
    type="button"
    [matMenuTriggerFor]="settingsMenu"
    [attr.aria-label]="'settings.buttonLabel' | translate"
    [attr.title]="'settings.buttonLabel' | translate">
    <mat-icon fontIcon="settings" aria-hidden="true"></mat-icon>
  </button>
</mat-toolbar>

<mat-menu #settingsMenu="matMenu" class="settings-menu" panelClass="settings-menu-panel">
  <div class="settings-menu-content" (click)="$event.stopPropagation()">
    <div class="settings-menu-section-title">{{ getLanguageSectionTitle() }}</div>
    <mat-button-toggle-group
      [value]="currentLanguage"
      (change)="changeLanguage($event.value)"
      [hideSingleSelectionIndicator]="true"
      aria-label="Вибір мови">
      <mat-button-toggle *ngFor="let lang of languages" [value]="lang.code" [class.ua-button]="lang.code === 'uk'" [class.en-button]="lang.code === 'en'" [class.ru-button]="lang.code === 'ru'">
        {{ lang.label }}
      </mat-button-toggle>
    </mat-button-toggle-group>

    <div class="settings-menu-section-title">{{ getThemeSectionTitle() }}</div>
    <div class="theme-options" role="radiogroup" aria-label="Вибір теми">
      <button
        *ngFor="let theme of themes"
        type="button"
        class="theme-option"
        [class.selected]="currentTheme === theme.code"
        role="radio"
        [attr.aria-checked]="currentTheme === theme.code"
        (click)="changeTheme(theme.code)">
        <mat-icon class="theme-option-radio" aria-hidden="true">
          {{ currentTheme === theme.code ? 'radio_button_checked' : 'radio_button_unchecked' }}
        </mat-icon>
        <span class="theme-option-label">{{ theme.label }}</span>
        <span class="theme-option-preview" [ngClass]="'theme-preview--' + theme.code" aria-hidden="true"></span>
      </button>
    </div>
  </div>
</mat-menu>
